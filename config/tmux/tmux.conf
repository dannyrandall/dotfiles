set -g default-terminal "tmux-256color"
set -g set-clipboard off
set -g history-limit 20000
set -g mouse on
set -g focus-events on
set-window-option -g mode-keys vi

# show short command name or working directory for window names
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{s|.*/(.*/.*$)|\1|:pane_current_path},#{b:pane_current_command}}'

# vim window movements/splits
bind s split-window -h
bind v split-window -v
bind h select-pane -L
bind j select-pane -U
bind k select-pane -D
bind l select-pane -R

# catppuccin theme
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @plugin 'catppuccin/tmux#v2.3.0'

# auto dark/light mode switching (tmux 3.6+ native hooks)
set-hook -g client-dark-theme {
  set -g @catppuccin_flavor "macchiato"
  set -g @catppuccin_reset "true"
  run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
  # catppuccin's reset doesn't clear per-module colors (set with -o),
  # so we unset them manually before the second run re-derives them.
  set -g @catppuccin_window_status_style "rounded"
  set -g @catppuccin_window_text " #W"
  set -g @catppuccin_window_current_text " #W"
  set -Ugq @catppuccin_status_session_text_fg
  set -Ugq @catppuccin_status_session_icon_fg
  run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"
  run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
  # catppuccin's reset doesn't clear per-module colors (set with -o),
  # so we unset them manually before the second run re-derives them.
  set -g @catppuccin_window_status_style "rounded"
  set -g @catppuccin_window_text " #W"
  set -g @catppuccin_window_current_text " #W"
  set -Ugq @catppuccin_status_session_text_fg
  set -Ugq @catppuccin_status_session_icon_fg
  run '~/.config/tmux/plugins/tmux/catppuccin.tmux'
}

bind w choose-tree -wZ -F '#{window_name} #{pane_current_path}'

# more theme options
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "" # remove session name from left since it's on right
set -g status-right "#{E:@catppuccin_status_session}"

# OSC 52 clipboard - copies to macOS clipboard over SSH
set -g set-clipboard on

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

run 'tpack init'
